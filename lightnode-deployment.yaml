apiVersion: apps/v1
kind: Deployment
metadata:
  name: hippius-lightnode
  namespace: hippius-lightnode
  labels:
    app: hippius-lightnode
    node-type: lightnode
    network: mainnet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hippius-lightnode
  template:
    metadata:
      labels:
        app: hippius-lightnode
        node-type: lightnode
        network: mainnet
    spec:
      containers:
      - name: hippius-node   
        image: ghcr.io/thenervelab/thebrain/hippius-node:latest
        imagePullPolicy: Always
        command:
        - /usr/local/bin/hippius
        args:
        - --base-path=/data
        - --chain=hippius-mainnet
        - --name=hippius-lightnode-mainnet
        - --rpc-external
        - --rpc-cors=all
        - --rpc-methods=Safe
        - --database=paritydb  
        - --bootnodes=/ip4/198.244.165.236/tcp/30333/ws/p2p/12D3KooWAXNTAcp2d8rFG6iW43nYhkciWepUFJxr8yzZbELyYByb
        - --sync=warp    
        ports:
        - name: p2p
          containerPort: 30333
          protocol: TCP
        - name: http-rpc
          containerPort: 9933
          protocol: TCP
        - name: ws-rpc
          containerPort: 9944
          protocol: TCP
        - name: metrics
          containerPort: 9615
          protocol: TCP
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 9933
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 9933
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: hippius-lightnode-data
